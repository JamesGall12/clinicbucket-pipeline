<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClinicBucket / Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  #gate {
    position: fixed; inset: 0; background: #F7F6F2;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; font-family: 'IBM Plex Sans', sans-serif;
  }
  #gate-box { text-align: center; }
  #gate-box p { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: #1a1a18; margin-bottom: 12px; }
  #gate-box input {
    font-family: 'IBM Plex Sans', sans-serif; font-size: 14px;
    border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px;
    padding: 9px 14px; outline: none; background: #fff;
    display: block; width: 220px; margin: 0 auto 8px; text-align: center;
  }
  #gate-box input:focus { border-color: #1D9E75; }
  #gate-box button {
    font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; font-weight: 500;
    background: #1D9E75; color: #fff; border: none; border-radius: 8px;
    padding: 9px 24px; cursor: pointer; width: 220px;
  }
  #gate-box .err { font-size: 12px; color: #A32D2D; margin-top: 6px; display: none; }
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --green-text: #085041;
    --amber-light: #FAEEDA;
    --amber-text: #854F0B;
    --blue-light: #E6F1FB;
    --blue-text: #185FA5;
    --purple-light: #EEEDFE;
    --purple-text: #3C3489;
    --red-light: #FCEBEB;
    --red-text: #A32D2D;
    --gray-light: #F1EFE8;
    --gray-text: #5F5E5A;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface2: #F1EFE8;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9a9a95;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* Layout */
  .shell { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 12px; }
  .logo { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; letter-spacing: -0.01em; }
  .logo span { color: var(--green); }
  .header-right { display: flex; align-items: center; gap: 10px; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .stat-n { font-family: 'IBM Plex Mono', monospace; font-size: 24px; font-weight: 500; color: var(--text); line-height: 1; }
  .stat-l { font-size: 11px; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Controls */
  .controls { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .controls input, .controls select {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .controls input { flex: 1; min-width: 200px; }
  .controls input:focus, .controls select:focus { border-color: var(--green); }

  /* Buttons */
  .btn {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--border-strong); }
  .btn-primary { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-primary:hover { background: var(--green-dark); border-color: var(--green-dark); }
  .btn-sm { font-size: 11px; padding: 5px 10px; }

  /* Add form */
  .add-form {
    background: var(--surface);
    border: 0.5px solid var(--green);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1rem;
    display: none;
  }
  .add-form.open { display: block; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .form-grid .full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 3px; }
  .field label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
  .field input, .field select, .field textarea {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 7px;
    padding: 7px 10px;
    color: var(--text);
    outline: none;
    resize: vertical;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--green); }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

  /* Cards */
  .prospect-list { display: flex; flex-direction: column; gap: 6px; }
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .card:hover { border-color: var(--border-strong); }
  .card.expanded { border-color: var(--green); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .card-left { flex: 1; min-width: 0; }
  .card-company { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-contact { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }

  /* Badges */
  .badge { font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 99px; letter-spacing: 0.02em; white-space: nowrap; }
  .b-sequence { background: var(--blue-light); color: var(--blue-text); }
  .b-positive { background: var(--green-light); color: var(--green-text); }
  .b-meeting { background: var(--purple-light); color: var(--purple-text); }
  .b-lost { background: var(--gray-light); color: var(--gray-text); }
  .b-neutral { background: var(--amber-light); color: var(--amber-text); }

  .due-tag { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); }
  .due-tag.overdue { color: var(--red-text); font-weight: 500; }
  .due-tag.soon { color: var(--amber-text); }

  .card-next { font-size: 12px; color: var(--text2); margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--border); line-height: 1.4; }
  .card-next strong { color: var(--text); font-weight: 500; }

  /* Expanded */
  .expanded-body { display: none; margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); }
  .card.expanded .expanded-body { display: block; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-bottom: 12px; }
  .detail-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
  .detail-val { font-size: 13px; color: var(--text); }
  .detail-val a { color: var(--green); text-decoration: none; }
  .detail-val a:hover { text-decoration: underline; }

  .notes-box { background: var(--bg); border-radius: 8px; padding: 10px 12px; font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 12px; }

  .comms-summary { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .comm-chip { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-family: 'IBM Plex Mono', monospace; }
  .comm-call { background: var(--purple-light); color: var(--purple-text); }
  .comm-email { background: var(--blue-light); color: var(--blue-text); }
  .comm-linkedin { background: var(--green-light); color: var(--green-text); }
  .comm-whatsapp { background: var(--amber-light); color: var(--amber-text); }
  .comms-log { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
  .comm-entry { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; padding: 7px 10px; background: var(--bg); border-radius: 7px; }
  .comm-entry-type { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 99px; flex-shrink: 0; margin-top: 1px; }
  .comm-entry-body { flex: 1; color: var(--text2); line-height: 1.4; }
  .comm-entry-date { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); flex-shrink: 0; margin-top: 2px; }
  .comm-entry-del { font-size: 10px; color: var(--text3); cursor: pointer; flex-shrink: 0; padding: 2px 4px; }
  .comm-entry-del:hover { color: var(--red-text); }
  .log-form { display: flex; gap: 6px; flex-wrap: wrap; align-items: flex-start; margin-top: 8px; }
  .log-form select, .log-form input { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; background: var(--bg); border: 0.5px solid var(--border); border-radius: 7px; padding: 6px 8px; color: var(--text); outline: none; }
  .log-form select:focus, .log-form input:focus { border-color: var(--green); }
  .log-form input[type="text"] { flex: 1; min-width: 140px; }
  .log-form input[type="date"] { width: 130px; }

  .inline-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .inline-controls select, .inline-controls input[type="date"] {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 7px;
    padding: 5px 8px;
    color: var(--text);
    outline: none;
  }
  .inline-controls select:focus, .inline-controls input:focus { border-color: var(--green); }
  .inline-controls textarea {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 7px;
    padding: 6px 8px;
    color: var(--text);
    outline: none;
    resize: vertical;
    width: 100%;
  }
  .inline-controls textarea:focus { border-color: var(--green); }

  .section-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; margin-top: 10px; }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 13px; }

  /* Section dividers in list */
  .section-divider { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; padding: 0.5rem 0 0.25rem; margin-top: 0.5rem; border-top: 0.5px solid var(--border); }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
    .detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

  <div class="stats" id="statsRow"></div>

  <div class="controls">

          <option>Meeting Booked</option>
          <option>Closed Lost</option>
        </select>
      </div>
      <div class="field"><label>Next action due</label><input type="date" id="nDue"></div>
      <div class="field full"><label>Next action</label><input type="text" id="nNext" placeholder="What needs to happen?"></div>
      <div class="field full"><label>Notes / intel</label><textarea id="nNotes" rows="2" placeholder="Context, angles, objections..."></textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="toggleAdd()">Cancel</button>
      <button class="btn btn-primary" onclick="addProspect()">Save prospect</button>
    </div>
  </div>

  <div class="prospect-list" id="list"></div>
</div>

  {company:"Resilience Medicine",contact:"Dr Dani Gordon",role:"Founder",email:"dani@resiliencemedicine.co.uk",phone:"",linkedin:"https://www.linkedin.com/in/drdanigordon/",status:"Closed Lost",next:"",due:"",notes:"Not ICP, leave for now.",touches:0},
  {company:"MyAccess Clinics",contact:"Christopher Strauch",role:"CEO",email:"chris@montu.com.au",phone:"",linkedin:"https://www.linkedin.com/in/christopherstrauch/",status:"Closed Lost",next:"",due:"",notes:"Acquired by Montu. Do not contact.",touches:0},
  {company:"LVL Health",contact:"Tony Samios",role:"CEO",email:"",phone:"",linkedin:"https://www.linkedin.com/in/tony-samios-92397011/",status:"Closed Lost",next:"",due:"",notes:"DNC.",touches:0},
  {company:"Treat-It Clinic",contact:"Bede Ronzani",role:"CFO",email:"bede@easykind.com.au",phone:"",linkedin:"https://www.linkedin.com/in/bederonzani/",status:"Closed Lost",next:"",due:"",notes:"Acquired by EasyKind.",touches:0},
  {company:"Leva / Zerenia / Khiron",contact:"Eric Bystrom",role:"CEO",email:"eric@levaclinic.com",phone:"",linkedin:"https://linkedin.com/in/eric-bystrom-0a3831",status:"Closed Lost",next:"Set Google Alert, revisit if recapitalized",due:"",notes:"IASO Ltd entered administration Oct 2024. Khiron parent micro-cap. High payment risk. If Bystrom moves to stable company, follow him.",touches:3},
  {company:"Montu",contact:"Angus O'Connell",role:"Head of B2C Marketing",email:"angus.o@montu.com.au",phone:"",linkedin:"",status:"Closed Lost",next:"Reach out to Angus for warm intro to Veronica",due:"",notes:"30-min meeting. Angus said he'd connect to Veronica who heads UK marketing for Montu.",touches:1},
  {company:"Via Clinic",contact:"Eileen Feeney",role:"CEO",email:"eileen.feeney@viaclinic.co.uk",phone:"",linkedin:"https://www.linkedin.com/in/eileen-feeney-6060716/",status:"Closed Lost",next:"",due:"",notes:"Only prescribes to certain patients. Not a cannabis clinic.",touches:3},
];

let prospects = JSON.parse(localStorage.getItem('cb_prospects') || 'null');
if (!prospects) {
  prospects = SEED.map((p, i) => ({ ...p, id: Date.now() + i }));
  save();
}

let expanded = null;

function save() { localStorage.setItem('cb_prospects', JSON.stringify(prospects)); }

function toggleAdd() {
  const f = document.getElementById('addForm');
  f.classList.toggle('open');
  if (f.classList.contains('open')) document.getElementById('nCompany').focus();
}

function addProspect() {
  const company = document.getElementById('nCompany').value.trim();
  if (!company) { document.getElementById('nCompany').focus(); return; }
  prospects.unshift({
    id: Date.now(),
    company,
    contact: document.getElementById('nContact').value.trim(),
    role: document.getElementById('nRole').value.trim(),
    email: document.getElementById('nEmail').value.trim(),
    linkedin: document.getElementById('nLinkedIn').value.trim(),
    phone: document.getElementById('nPhone').value.trim(),
    status: document.getElementById('nStatus').value,
    next: document.getElementById('nNext').value.trim(),
    due: document.getElementById('nDue').value,
    notes: document.getElementById('nNotes').value.trim(),
    touches: 0
  });
  save();
  ['nCompany','nContact','nRole','nEmail','nLinkedIn','nPhone','nNext','nDue','nNotes'].forEach(id => {
    const el = document.getElementById(id);
    if (el.tagName === 'TEXTAREA' || el.type !== 'date') el.value = '';
    else el.value = '';
  });
  document.getElementById('addForm').classList.remove('open');
  render();
}

function badgeClass(s) {
  if (s === 'In Sequence') return 'b-sequence';
  if (s === 'Replied - Positive') return 'b-positive';
  if (s === 'Meeting Booked') return 'b-meeting';
  if (s === 'Closed Lost') return 'b-lost';
  return 'b-neutral';
}

function dueSev(due) {
  if (!due) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((new Date(due) - today) / 86400000);
  if (diff < 0) return 'overdue';
  if (diff <= 7) return 'soon';
  return '';
}

function fmtDue(due) {
  if (!due) return '';
  return new Date(due).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' });
}

function toggleExpand(id) {
  expanded = expanded === id ? null : id;
  render();
}

function updateField(id, field, val) {
  const p = prospects.find(x => x.id === id);
  if (p) { p[field] = val; save(); }
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const fs = document.getElementById('fstatus').value;
  const sort = document.getElementById('fsort').value;

  let list = prospects.filter(p => {
    if (fs && p.status !== fs) return false;
    if (q) {
      const blob = [p.company, p.contact, p.role, p.notes, p.next, p.email].join(' ').toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });

  if (sort === 'due') {
    list.sort((a, b) => {
      if (!a.due && !b.due) return 0;
      if (!a.due) return 1;
      if (!b.due) return -1;
      return new Date(a.due) - new Date(b.due);
    });
  } else if (sort === 'company') {
    list.sort((a, b) => a.company.localeCompare(b.company));
  } else if (sort === 'status') {
    const order = ['Meeting Booked','Replied - Positive','In Sequence','Closed Lost'];
    list.sort((a, b) => order.indexOf(a.status) - order.indexOf(b.status));
  }

  return list;
}

function commsCounts(p) {
  const c = p.comms || [];
  const counts = {};
  c.forEach(x => { counts[x.type] = (counts[x.type]||0) + 1; });
  return counts;
}

function commsChips(p) {
  const counts = commsCounts(p);
  return Object.entries(counts).map(([type, n]) =>
    `<span class="comm-chip comm-${type.toLowerCase()}">${type} ×${n}</span>`
  ).join('');
}

function commsSummary(p) {
  const counts = commsCounts(p);
  const total = Object.values(counts).reduce((a,b)=>a+b,0);
  if (!total) return '';
  return `<span style="font-weight:400;color:var(--text3);font-size:10px;margin-left:4px">(${total} total)</span>`;
}

function addComm(id) {
  const p = prospects.find(x => x.id === id);
  if (!p) return;
  const type = document.getElementById(`ct-${id}`).value;
  const note = document.getElementById(`cn-${id}`).value.trim();
  const date = document.getElementById(`cd-${id}`).value;
  if (!p.comms) p.comms = [];
  p.comms.push({ type, note, date });
  document.getElementById(`cn-${id}`).value = '';
  save();
  render();
}

function deleteComm(pid, idx) {
  const p = prospects.find(x => x.id === pid);
  if (p && p.comms) { p.comms.splice(idx, 1); save(); render(); }
}

function render() {
  const filtered = getFiltered();
  const active = prospects.filter(p => p.status !== 'Closed Lost');
  const warm = prospects.filter(p => ['Replied - Positive','Meeting Booked'].includes(p.status));
  const overdue = prospects.filter(p => dueSev(p.due) === 'overdue' && p.status !== 'Closed Lost');

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-n">${active.length}</div><div class="stat-l">Active</div></div>
    <div class="stat-card"><div class="stat-n">${warm.length}</div><div class="stat-l">Warm</div></div>
    <div class="stat-card"><div class="stat-n">${overdue.length}</div><div class="stat-l" style="color:${overdue.length>0?'var(--red-text)':'inherit'}">Overdue</div></div>
    <div class="stat-card"><div class="stat-n">${prospects.length}</div><div class="stat-l">Total</div></div>
  `;

  if (!filtered.length) {
    document.getElementById('list').innerHTML = '<div class="empty-state">No prospects match.</div>';
    return;
  }

  document.getElementById('list').innerHTML = filtered.map(p => {
    const sev = dueSev(p.due);
    const isExp = expanded === p.id;

    return `
    <div class="card${isExp ? ' expanded' : ''}" id="card-${p.id}" onclick="toggleExpand(${p.id})">
      <div class="card-top">
        <div class="card-left">
          <div class="card-company">${p.company}</div>
          <div class="card-contact">${p.contact}${p.role ? ' · ' + p.role : ''}</div>
          ${(p.comms||[]).length ? `<div class="comms-summary">${commsChips(p)}</div>` : ''}
        </div>
        <div class="card-right">
          <span class="badge ${badgeClass(p.status)}">${p.status}</span>
          ${p.due ? `<span class="due-tag ${sev}">${sev === 'overdue' ? '⚠ ' : ''}${fmtDue(p.due)}</span>` : ''}
        </div>
      </div>
      ${p.next ? `<div class="card-next"><strong>Next:</strong> ${p.next}</div>` : ''}

      <div class="expanded-body">
        <div class="detail-grid">
          ${p.email ? `<div><div class="detail-label">Email</div><div class="detail-val"><a href="mailto:${p.email}">${p.email}</a></div></div>` : ''}
          ${p.phone ? `<div><div class="detail-label">Phone</div><div class="detail-val">${p.phone}</div></div>` : ''}
          ${p.linkedin ? `<div><div class="detail-label">LinkedIn</div><div class="detail-val"><a href="${p.linkedin}" target="_blank">View profile ↗</a></div></div>` : ''}
          ${p.notes ? `<div style="grid-column:1/-1"><div class="detail-label">Notes</div><div class="notes-box" style="margin:0">${p.notes}</div></div>` : ''}
        </div>

        ${p.notes ? `<div class="notes-box">${p.notes}</div>` : ''}

        <div class="section-label">Update status</div>
        <div class="inline-controls" onclick="event.stopPropagation()">
          <select onchange="updateField(${p.id},'status',this.value);render()">
            ${['In Sequence','Replied - Positive','Meeting Booked','Closed Lost'].map(s =>
              `<option${p.status===s?' selected':''}>${s}</option>`
            ).join('')}
          </select>
          <input type="date" value="${p.due||''}" onchange="updateField(${p.id},'due',this.value);render()" title="Next action due">
        </div>
        <div style="margin-top:8px" onclick="event.stopPropagation()">
          <textarea rows="2" placeholder="Next action..." onchange="updateField(${p.id},'next',this.value)">${p.next||''}</textarea>
        </div>

        <div class="section-label" style="margin-top:14px">Comms log ${commsSummary(p)}</div>
        <div class="comms-log" onclick="event.stopPropagation()">
          ${(p.comms||[]).slice().reverse().map((c,ri) => {
            const i = (p.comms.length - 1) - ri;
            return `<div class="comm-entry">
              <span class="comm-entry-type comm-${c.type.toLowerCase()}">${c.type}</span>
              <div class="comm-entry-body">${c.note || '—'}</div>
              <span class="comm-entry-date">${c.date}</span>
              <span class="comm-entry-del" onclick="deleteComm(${p.id},${i})">✕</span>
            </div>`;
          }).join('') || '<div style="font-size:12px;color:var(--text3);padding:4px 0">No comms logged yet.</div>'}
        </div>
        <div class="log-form" onclick="event.stopPropagation()">
          <select id="ct-${p.id}">
            <option>Email</option>
            <option>Call</option>
            <option>LinkedIn</option>
            <option>WhatsApp</option>
          </select>
          <input type="text" id="cn-${p.id}" placeholder="What happened / outcome...">
          <input type="date" id="cd-${p.id}" value="${new Date().toISOString().split('T')[0]}">
          <button class="btn btn-sm btn-primary" onclick="addComm(${p.id})">Log</button>
        </div>

        <div style="margin-top:12px" onclick="event.stopPropagation()">
          <button class="btn btn-sm" style="color:var(--red-text);border-color:var(--red-text)" onclick="deleteProspect(${p.id})">Remove prospect</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function deleteProspect(id) {
  if (!confirm('Remove this prospect?')) return;
  prospects = prospects.filter(x => x.id !== id);
  expanded = null;
  save();
  render();
}

function exportCSV() {
  const headers = ['Company','Contact','Role','Email','Phone','LinkedIn','Status','Next Action','Due','Touches','Notes'];
  const rows = prospects.map(p => [
    p.company, p.contact, p.role, p.email, p.phone, p.linkedin,
    p.status, p.next, p.due, p.touches, p.notes
  ].map(v => `"${(v||'').toString().replace(/"/g,'""')}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'clinicbucket-pipeline.csv';
  a.click();
}

function checkPw() {
  const val = document.getElementById('pwInput').value;
  if (val === 'Claude3!Claude3!') {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    sessionStorage.setItem('cb_auth', '1');
  } else {
    document.getElementById('pwErr').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

if (sessionStorage.getItem('cb_auth') === '1') {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

render();
</script>
</body>
</html>
